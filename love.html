<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李月浠的治愈萌宠屋 🐾</title>
  <style>
    :root {
      --bg-color: #fdfcf0;
      --card-bg: rgba(255, 255, 255, 0.85);
      --primary-pink: #ffb7c5;
      --text-color: #6d4c41;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: var(--bg-color);
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 漂浮物样式 */
    .pet-float {
      position: absolute;
      font-size: 2rem;
      user-select: none;
      pointer-events: none;
      z-index: 1;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.05));
      opacity: 0.8;
    }

    .container {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      padding: 30px 40px;
      border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      border: 4px solid #fff;
      text-align: center;
      max-width: 400px;
      backdrop-filter: blur(5px);
    }

    h1 {
      color: #d87093;
      font-size: 1.8rem;
      margin-top: 0;
    }

    p {
      color: var(--text-color);
      line-height: 1.6;
      font-size: 1.1rem;
    }

    .btn-group {
      margin-top: 25px;
    }

    button {
      background: #ffccbc;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 1rem;
      color: #5d4037;
      cursor: pointer;
      transition: all 0.3s;
      margin: 8px;
      font-weight: bold;
      box-shadow: 0 4px 0 #d7ccc8;
    }

    button:hover {
      transform: translateY(-2px);
      background: #ffab91;
      box-shadow: 0 6px 0 #d7ccc8;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    #message-display {
      margin-top: 20px;
      min-height: 50px;
      color: #ef5350;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 动画 */
    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .main-img {
      font-size: 4rem;
      margin-bottom: 10px;
      display: inline-block;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="main-img">🐱🐶</div>
  <h1>李月浠专属加油站</h1>
  <p>不开心的事情就把它当成臭臭<br>让小猫小狗帮你埋掉吧！</p>

  <div id="message-display">点一点下面，它们有话对你说~</div>

  <div class="btn-group">
    <button onclick="spawnPet('🐱')">召唤小猫 🐈</button>
    <button onclick="spawnPet('🐶')">召唤小狗 🐕</button>
    <button onclick="randomMsg()">听听鼓励 🍦</button>
  </div>
</div>

<script>
  const pets = ['🐱', '🐶', '🐾', '🦴', '🐟', '🐹', '🐰'];
  const messages = [
    "月浠，你是全世界最可爱的铲屎官！",
    "所有的坏心情，都会被小猫的呼噜声治愈哦~",
    "狗狗说：你是它最喜欢的人，所以要开心呀！",
    "哪怕乌云密布，你也是照亮我生活的小太阳。",
    "李月浠，今天辛苦啦，允许你躲在怀里撒个娇。",
    "生活偶尔不可爱，但你永远最可爱！",
    "去吃点甜的吧，像你一样甜的那种~"
  ];

  // 自动生成背景漂浮物
  function createFloatingPet() {
    const pet = document.createElement('div');
    pet.className = 'pet-float';
    const type = pets[Math.floor(Math.random() * pets.length)];
    pet.innerText = type;

    // 随机位置和属性
    const left = Math.random() * 100;
    const duration = Math.random() * 5 + 8; // 8-13秒
    const size = Math.random() * 20 + 20; // 20-40px

    pet.style.left = left + 'vw';
    pet.style.fontSize = size + 'px';
    pet.style.animation = `floatUp ${duration}s linear forwards`;

    document.body.appendChild(pet);

    // 动画结束后移除
    setTimeout(() => {
      pet.remove();
    }, duration * 1000);
  }

  // 定时生成
  setInterval(createFloatingPet, 800);

  // 手动召唤
  function spawnPet(emoji) {
    for(let i=0; i<8; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'pet-float';
        p.innerText = emoji;
        p.style.left = (Math.random() * 40 + 30) + 'vw';
        p.style.bottom = '0';
        p.style.fontSize = '40px';
        p.style.animation = `floatUp ${Math.random()*2 + 2}s ease-out forwards`;
        document.body.appendChild(p);
      }, i * 100);
    }
    document.getElementById('message-display').innerText = "哇！一大波可爱正在靠近！";
  }

  function randomMsg() {
    const display = document.getElementById('message-display');
    const msg = messages[Math.floor(Math.random() * messages.length)];
    display.style.opacity = 0;
    setTimeout(() => {
      display.innerText = msg;
      display.style.opacity = 1;
    }, 300);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李月浠的治愈萌宠屋 🐾</title>
  <style>
    :root {
      --bg-color: #fdfcf0;
      --card-bg: rgba(255, 255, 255, 0.9);
      --primary-pink: #ffb7c5;
      --text-color: #6d4c41;
    }

    body {
      margin: 0; padding: 0; height: 100vh;
      background: var(--bg-color);
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }

    /* 顶部装饰栏（放喇叭的地方） */
    .header-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    /* 喇叭按钮样式 */
    .music-btn {
      font-size: 2.5rem;
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
      display: inline-block;
    }
    .music-btn.playing {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* 跑动的小狗 */
    .running-dog {
      position: absolute;
      font-size: 3rem;
      z-index: 2;
      bottom: 10%;
      transition: transform 0.1s;
      pointer-events: none;
      white-space: nowrap;
    }

    .container {
      position: relative; z-index: 10;
      background: var(--card-bg);
      padding: 30px 40px; border-radius: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      border: 4px solid #fff; text-align: center;
      max-width: 400px; backdrop-filter: blur(5px);
    }

    h1 { color: #d87093; font-size: 1.8rem; margin: 10px 0; }
    p { color: var(--text-color); line-height: 1.6; font-size: 1.1rem; }

    .btn-group { margin-top: 25px; }
    button {
      background: #ffccbc; border: none; padding: 12px 25px;
      border-radius: 50px; font-size: 1rem; color: #5d4037;
      cursor: pointer; transition: all 0.3s; margin: 8px;
      font-weight: bold; box-shadow: 0 4px 0 #d7ccc8;
    }
    button:hover { transform: translateY(-2px); background: #ffab91; }

    #message-display {
      margin-top: 20px; min-height: 50px;
      color: #ef5350; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }

    /* 背景漂浮物 */
    .pet-float {
      position: absolute; font-size: 2rem;
      pointer-events: none; z-index: 1;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* 小狗跑动动画 */
    @keyframes dogRun1 {
      0% { left: -100px; transform: scaleX(1); }
      49% { transform: scaleX(1); }
      50% { left: calc(100% + 100px); transform: scaleX(-1); }
      99% { transform: scaleX(-1); }
      100% { left: -100px; transform: scaleX(1); }
    }
  </style>
</head>
<body>

<!-- 跑动的小狗背景 -->
<div class="running-dog" style="animation: dogRun1 15s infinite linear; bottom: 15%;">🐕</div>
<div class="running-dog" style="animation: dogRun1 22s infinite linear reverse; bottom: 5%;">🐩</div>

<div class="container">
  <!-- 顶部图标区 -->
  <div class="header-icons">
    <span style="font-size: 4rem;">🐱🐶</span>
    <!-- 喇叭按钮在此 -->
    <div id="musicBtn" class="music-btn" onclick="toggleMusic()">📢</div>
  </div>

  <h1>李月浠专属加油站</h1>
  <p>不开心的事情就把它当成臭臭<br>让小猫小狗帮你埋掉吧！</p>

  <div id="message-display">点点小喇叭，听听歌吧 🎵</div>

  <div class="btn-group">
    <button onclick="spawnPet('🐱')">召唤小猫 🐈</button>
    <button onclick="spawnPet('🐶')">召唤小狗 🐕</button>
    <button onclick="randomMsg()">听听鼓励 🍦</button>
  </div>
</div>

<!-- 音乐文件 -->
<!-- 这是一个直到你降临的外部链接，如果失效可以换成你自己的 -->
<audio id="bgMusic" loop>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
  const pets = ['🐱', '🐶', '🐾', '🦴', '🐟', '🐹', '🐰'];
  const messages = [
    "月浠，你是全世界最可爱的铲屎官！",
    "所有的坏心情，都会被小猫的呼噜声治愈哦~",
    "狗狗说：你是它最喜欢的人，所以要开心呀！",
    "李月浠，哪怕乌云密布，你也是照亮我的小太阳。",
    "生活偶尔不可爱，但你永远最可爱！",
    "李月浠，今天辛苦啦，允许你躲在怀里撒个娇。",
    "直到你降临，我的世界才有了光 ✨"
  ];

  // 音乐控制
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');

  // 由于版权音乐链接很难找，如果你有本地mp3，
  // 建议把音乐文件上传到GitHub项目里，然后把 source src 改为 "直到你降临.mp3"
  // 这里的链接目前是一个随机热歌作为占位
  function toggleMusic() {
    if (music.paused) {
      music.play();
      musicBtn.innerText = '📻';
      musicBtn.classList.add('playing');
      document.getElementById('message-display').innerText = "正在为你播放《直到你降临》🎵";
    } else {
      music.pause();
      musicBtn.innerText = '📢';
      musicBtn.classList.remove('playing');
    }
  }

  // 自动生成背景漂浮物
  function createFloatingPet() {
    const pet = document.createElement('div');
    pet.className = 'pet-float';
    pet.innerText = pets[Math.floor(Math.random() * pets.length)];
    const duration = Math.random() * 5 + 8;
    pet.style.left = Math.random() * 100 + 'vw';
    pet.style.fontSize = (Math.random() * 20 + 20) + 'px';
    pet.style.animation = `floatUp ${duration}s linear forwards`;
    document.body.appendChild(pet);
    setTimeout(() => pet.remove(), duration * 1000);
  }
  setInterval(createFloatingPet, 800);

  function spawnPet(emoji) {
    for(let i=0; i<8; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'pet-float';
        p.innerText = emoji;
        p.style.left = (Math.random() * 40 + 30) + 'vw';
        p.style.bottom = '0';
        p.style.fontSize = '40px';
        p.style.animation = `floatUp ${Math.random()*2 + 2}s ease-out forwards`;
        document.body.appendChild(p);
      }, i * 100);
    }
  }

  function randomMsg() {
    const display = document.getElementById('message-display');
    const msg = messages[Math.floor(Math.random() * messages.length)];
    display.style.opacity = 0;
    setTimeout(() => {
      display.innerText = msg;
      display.style.opacity = 1;
    }, 300);
  }
</script>
</body>
</html>
